# Name matches what the git-connected dashboard project created (it
# overrides this field on its own builds; keeping them equal means a manual
# `wrangler deploy` updates the same Worker instead of minting a second one).
name = "find-your-pickle-balls"
compatibility_date = "2026-07-07"

# Static-assets-only Worker (no `main`) — serves the built Astro site.
# Deployed via git-connected Workers Builds; deploy command runs at the
# repo root, so it passes --config apps/web/wrangler.toml. Paths below
# resolve relative to THIS file.

[assets]
directory = "./dist"
