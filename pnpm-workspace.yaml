packages:
  - apps/*
  - packages/*
# Windows + React Native: the default isolated (symlinked .pnpm) layout breaks
# the native CMake/ninja builds in react-native-worklets/screens — object paths
# blow the 250-char CMAKE_OBJECT_PATH_MAX and ninja loops on a "still dirty"
# manifest through the symlinks. Hoisted = flat real directories, the layout
# Expo recommends for RN monorepos.
nodeLinker: hoisted
allowBuilds:
  esbuild: true
  # astro/miniflare dep; ships prebuilt binaries (@img/sharp-*) as optional deps.
  # Its install script is `check.js || npm run build`, and check.js exits 1 on any
  # host with a global libvips — which the EAS macOS builders have via Homebrew.
  # That fallback source build needs node-addon-api, only sharp's own devDep, so
  # it fails the install. Windows never hits this: check.js short-circuits there.
  sharp: false
  # eslint dep; ships prebuilt binaries, postinstall is only a fallback
  unrs-resolver: false
  workerd: true
minimumReleaseAgeExclude:
  - expo-dev-client@57.0.6
  - expo-dev-launcher@57.0.6
  - expo-dev-menu@57.0.6
